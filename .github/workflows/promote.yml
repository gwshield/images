# =============================================================================
# PROMOTE — Receive image promotion requests from gwshield/images-processor
# =============================================================================
# Triggered by repository_dispatch (event: promote-image) from the private
# build pipeline (gwshield/images-processor release-public workflow).
#
# Auth strategy (no broad PATs, no credential leakage):
#   - Src pull (ghcr.io/gwshield): gwshield-img-builder App token — scoped to
#     gwshield org with packages:read
#   - Dst push (ghcr.io/gwshield):  GITHUB_TOKEN — native write:packages for
#     gwshield org (this workflow runs inside gwshield/images)
#   - cosign OIDC:                  id-token: write — OIDC identity from
#     https://github.com/gwshield/images/.github/workflows/promote.yml
#
# Payload fields (client_payload — no credentials):
#   name         e.g. traefik
#   version      e.g. v3.6.9
#   base_version e.g. v3.6.9
#   profile      e.g. "" or "tls" or "cluster"
#   src_digest   e.g. sha256:abc123...  (used for signing/SBOM ref)
#   src_tag      e.g. v3.6.9 or main    (tag resolved upstream — used for copy)
#   src_image    e.g. ghcr.io/gwshield/gwshield-traefik
#   platforms    e.g. ["linux/amd64","linux/arm64"] (from release-public.yml detection)
#                Hint only — promote.yml re-detects from the pushed destination image.
#
# Structure (ADR-0007 Phase 1):
#   promote-core — calls promote-reusable.yml (skopeo + cosign + SBOM + SLSA + Trivy)
#   promote-post — gwshield-specific: unit tests, registry.json, Supabase, smoke, README
# =============================================================================

name: promote

on:
  repository_dispatch:
    types: [promote-image]

concurrency:
  group: promote-${{ github.event.client_payload.name }}-${{ github.event.client_payload.version }}
  cancel-in-progress: false

permissions:
  contents: write       # commit registry.json + trigger readme-update
  packages: write       # GITHUB_TOKEN write:packages for gwshield org
  id-token: write       # cosign OIDC keyless signing

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Generic promotion core — skopeo copy, cosign, SBOM, SLSA, Trivy
  # ---------------------------------------------------------------------------
  promote-core:
    name: Promote core ${{ github.event.client_payload.name }}:${{ github.event.client_payload.version }}
    uses: ./.github/workflows/promote-reusable.yml
    with:
      name:         ${{ github.event.client_payload.name }}
      version:      ${{ github.event.client_payload.version }}
      base_version: ${{ github.event.client_payload.base_version }}
      profile:      ${{ github.event.client_payload.profile }}
      src_image:    ${{ github.event.client_payload.src_image }}
      src_tag:      ${{ github.event.client_payload.src_tag }}
      src_digest:   ${{ github.event.client_payload.src_digest }}
      dst_registry: ghcr.io
      dst_org:      gwshield
      cosign_identity_regexp: "https://github.com/gwshield/images.*"
      category:     ${{ github.event.client_payload.category }}
    secrets:
      GWSHIELD_IMG_BUILDER_APP_ID:  ${{ secrets.GWSHIELD_IMG_BUILDER_GITHUB_APP_ID }}
      GWSHIELD_IMG_BUILDER_PRIVATE_KEY: ${{ secrets.GWSHIELD_IMG_BUILDER_PRIVATE_KEY }}

  # ---------------------------------------------------------------------------
  # Job 2: gwshield-specific post-processing
  # Runs after promote-core. Uses reusable outputs for all metadata writes.
  # Note: unit tests run here (after push). If tests fail, no metadata is
  # written to Supabase or registry.json — image is pushed but unrecorded.
  # This is the correct trade-off (see ADR-0007).
  # ---------------------------------------------------------------------------
  promote-post:
    name: Promote post ${{ github.event.client_payload.name }}:${{ github.event.client_payload.version }}
    needs: promote-core
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      # -----------------------------------------------------------------------
      # Generate a short-lived App token for GitHub API calls in promote-post.
      # Used by: gwshield-init test (fetches test source), allowlist fetch.
      # Both steps use continue-on-error: true — a token failure must not block
      # the registry.json + Supabase writes that follow.
      # -----------------------------------------------------------------------
      - name: Generate App token for post-processing API calls
        id: post-token
        continue-on-error: true
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id:      ${{ secrets.GWSHIELD_IMG_BUILDER_GITHUB_APP_ID }}
          private-key: ${{ secrets.GWSHIELD_IMG_BUILDER_PRIVATE_KEY }}
          owner:       gwshield

      # -----------------------------------------------------------------------
      # Unit-test supabase_ingress.py pure helpers before any DB write.
      # Tests cover slug derivation, image_type detection, version group
      # heuristic, OS tag, Trivy findings parsing, and env-guard behaviour.
      # A test failure hard-stops the promote-post (no continue-on-error).
      # -----------------------------------------------------------------------
      - name: Test supabase_ingress.py
        run: python3 scripts/tests/test_supabase_ingress.py

      # -----------------------------------------------------------------------
      # Unit-test gwshield-init argv protocol (v1.1) before any metadata write.
      # continue-on-error: true — token failure must not block post.
      # Source file lives in gwshield/images-processor (canonical location).
      # -----------------------------------------------------------------------
      - name: Test gwshield-init (C unit tests)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.post-token.outputs.token }}
        run: |
          set -euo pipefail
          curl -sSfL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/gwshield/images-processor/contents/shared/banner/gwshield-init-test.c" \
            -o /tmp/gwshield-init-test.c
          docker run --rm \
            -v /tmp/gwshield-init-test.c:/src/gwshield-init-test.c:ro \
            alpine:3.21 sh -c '
              apk add --no-cache musl-dev gcc >/dev/null 2>&1
              gcc -static \
                -DGWS_SERVICE=\"testsvc\" \
                -DGWS_VERSION=\"v1.1.0\" \
                -DGWS_PROFILE=\"standard\" \
                -DGWS_BUILD_TS=\"1970-01-01T00:00:00Z\" \
                -DGWS_GIT_COMMIT=\"testcommit\" \
                -DGWS_GIT_BRANCH=\"testbranch\" \
                -DGWS_EXEC=\"/bin/true\" \
                -o /tmp/gwshield-init-test \
                /src/gwshield-init-test.c
              /tmp/gwshield-init-test
            '

      # -----------------------------------------------------------------------
      # Update registry.json via GitHub Contents API (atomic read-modify-write)
      # No git push -- avoids race conditions when 13 jobs run in parallel.
      # The API returns 409 if the SHA is stale; we retry with the fresh SHA.
      # Both promote and scan sub-commands run in the same retry loop so the
      # file is only written once per attempt.
      # -----------------------------------------------------------------------
      - name: Update registry.json (via GitHub API)
        id: registry
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NAME="${{ github.event.client_payload.name }}"
          VERSION="${{ github.event.client_payload.version }}"
          BASE_VERSION="${{ github.event.client_payload.base_version }}"
          PROFILE="${{ github.event.client_payload.profile }}"
          CATEGORY="${{ github.event.client_payload.category }}"
          DIGEST="${{ needs.promote-core.outputs.digest }}"
          TAGS="${{ needs.promote-core.outputs.tags }}"
          PROMOTED_AT="${{ needs.promote-core.outputs.promoted_at }}"
          COSIGN_IDENTITY="https://github.com/gwshield/images/.github/workflows/promote.yml@refs/heads/main"
          COMMIT_MSG="chore(registry): promote ${NAME}:${VERSION} [skip ci]"

          CVE_TOTAL="${{ needs.promote-core.outputs.cve_total }}"
          CVE_CRITICAL="${{ needs.promote-core.outputs.cve_critical }}"
          CVE_HIGH="${{ needs.promote-core.outputs.cve_high }}"
          SCANNED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          MAX=8
          for i in $(seq 1 $MAX); do
            echo "Attempt ${i}/${MAX} -- fetching current registry.json from API..."

            API_RESP=$(gh api repos/gwshield/images/contents/registry.json 2>/dev/null || echo "NOT_FOUND")

            if grep -q "NOT_FOUND" <<< "${API_RESP}"; then
              CURRENT_CONTENT=''
              FILE_SHA=''
            else
              CURRENT_CONTENT=$(echo "${API_RESP}" | python3 -c "import sys,json,base64; d=json.load(sys.stdin); print(base64.b64decode(d['content']).decode())")
              FILE_SHA=$(echo "${API_RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['sha'])")
            fi

            if [[ -n "${CURRENT_CONTENT}" ]]; then
              echo "${CURRENT_CONTENT}" > registry.json
            fi

            python3 scripts/update-registry.py promote \
              --name            "${NAME}" \
              --version         "${VERSION}" \
              --base-version    "${BASE_VERSION}" \
              --profile         "${PROFILE}" \
              --category        "${CATEGORY:-runtime}" \
              --digest          "${DIGEST}" \
              --tags            "${TAGS}" \
              --cosign-identity "${COSIGN_IDENTITY}" \
              --promoted-at     "${PROMOTED_AT}"

            python3 scripts/update-registry.py scan \
              --name         "${NAME}" \
              --version      "${VERSION}" \
              --cve-total    "${CVE_TOTAL:-0}" \
              --cve-critical "${CVE_CRITICAL:-0}" \
              --cve-high     "${CVE_HIGH:-0}" \
              --scanner      trivy \
              --scanned-at   "${SCANNED_AT}"

            NEW_CONTENT=$(base64 < registry.json | tr -d '\n')

            PAYLOAD=$(python3 -c "import json,sys; d={'message':sys.argv[1],'content':sys.argv[2],'branch':'main'}; d.update({'sha':sys.argv[3]} if sys.argv[3] else {}); print(json.dumps(d))" "${COMMIT_MSG}" "${NEW_CONTENT}" "${FILE_SHA}")

            HTTP_STATUS=$(echo "${PAYLOAD}" | gh api repos/gwshield/images/contents/registry.json \
              --method PUT \
              --input - \
              --jq '.commit.sha' 2>&1) && EXIT=$? || EXIT=$?

            if [[ $EXIT -eq 0 ]]; then
              echo "registry.json updated successfully on attempt ${i} (commit: ${HTTP_STATUS})"
              echo "promoted_at=${PROMOTED_AT}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "API write failed (attempt ${i}/${MAX}, likely stale SHA) -- retrying..."
            sleep $((i * 2))
          done

          echo "ERROR: could not update registry.json after ${MAX} attempts" >&2
          exit 1

      # -----------------------------------------------------------------------
      # Supabase writeback — upsert image/version/snapshot into gwshield-hub
      # Uses service role key (bypasses RLS — pipeline writes are trusted)
      # continue-on-error: true — Supabase outage must not block promote
      # -----------------------------------------------------------------------
      - name: Upsert image into Supabase
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          _PLATFORMS_JSON: ${{ needs.promote-core.outputs.platforms_json }}
          _IMAGE_SIZE_JSON: ${{ needs.promote-core.outputs.image_size_json }}
          _SBOM_REFS_JSON: ${{ needs.promote-core.outputs.sbom_refs_json }}
          _PROVENANCE_REFS_JSON: ${{ needs.promote-core.outputs.provenance_refs_json }}
        run: |
          set -euo pipefail
          PLATFORMS_JSON="${_PLATFORMS_JSON}"
          IMAGE_SIZE_JSON="${_IMAGE_SIZE_JSON}"
          SBOM_REFS_JSON="${_SBOM_REFS_JSON}"
          PROVENANCE_REFS_JSON="${_PROVENANCE_REFS_JSON:-}"

          PLAT_ARGS=()
          if [[ -n "${PLATFORMS_JSON}" && "${PLATFORMS_JSON}" != "[]" ]]; then
            PLAT_ARGS+=(--platforms "${PLATFORMS_JSON}")
          fi
          if [[ -n "${IMAGE_SIZE_JSON}" && "${IMAGE_SIZE_JSON}" != "{}" ]]; then
            PLAT_ARGS+=(--image-size-json "${IMAGE_SIZE_JSON}")
          fi
          if [[ -n "${SBOM_REFS_JSON}" && "${SBOM_REFS_JSON}" != "{}" ]]; then
            PLAT_ARGS+=(--sbom-refs-json "${SBOM_REFS_JSON}")
          fi
          if [[ -n "${PROVENANCE_REFS_JSON}" && "${PROVENANCE_REFS_JSON}" != "{}" ]]; then
            PLAT_ARGS+=(--provenance-refs-json "${PROVENANCE_REFS_JSON}")
          fi

          python3 scripts/supabase_ingress.py promote \
            --name            "${{ github.event.client_payload.name }}" \
            --version         "${{ github.event.client_payload.version }}" \
            --base-version    "${{ github.event.client_payload.base_version }}" \
            --profile         "${{ github.event.client_payload.profile }}" \
            --digest          "${{ needs.promote-core.outputs.digest }}" \
            --tags            "${{ needs.promote-core.outputs.tags }}" \
            --cosign-identity "https://github.com/gwshield/images/.github/workflows/promote.yml@refs/heads/main" \
            --promoted-at     "${{ needs.promote-core.outputs.promoted_at }}" \
            --image-type      "${{ github.event.client_payload.image_type }}" \
            "${PLAT_ARGS[@]}"

      # Fetch allowlist for this image from gwshield/images-processor so suppressed
      # CVEs can be written transparently alongside real Trivy findings.
      - name: Generate allowlist-findings.json
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.post-token.outputs.token }}
        run: |
          set -euo pipefail
          NAME="${{ github.event.client_payload.name }}"
          VERSION="${{ github.event.client_payload.version }}"

          curl -sSfL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/gwshield/images-processor/contents/shared/scripts/gen-trivyignore.py" \
            -o /tmp/gen-trivyignore.py

          mkdir -p allowlist-src
          python3 - <<'PYEOF'
          import json, os, base64, urllib.request, urllib.error

          token = os.environ["GH_TOKEN"]
          name  = os.environ["NAME"]

          def gh_get(path):
              url = f"https://api.github.com/repos/gwshield/images-processor/contents/{path}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github.v3+json",
              })
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def fetch_file(api_path, local_path):
              data = gh_get(api_path)
              content = base64.b64decode(data["content"])
              os.makedirs(os.path.dirname(local_path), exist_ok=True)
              with open(local_path, "wb") as f:
                  f.write(content)
              print(f"  fetched {api_path} -> {local_path}")

          try:
              top = gh_get("images")
          except Exception as e:
              print(f"Could not list images/: {e}")
              raise

          for entry in top:
              img_name = entry["name"]
              if not img_name.startswith(name):
                  continue
              try:
                  versions = gh_get(f"images/{img_name}")
              except Exception:
                  continue
              for ver_entry in versions:
                  ver = ver_entry["name"]
                  allowlist_path = f"images/{img_name}/{ver}/scan/allowlist.yaml"
                  local_path     = f"allowlist-src/{allowlist_path}"
                  try:
                      fetch_file(allowlist_path, local_path)
                  except Exception:
                      pass
          PYEOF

          if ls allowlist-src/images/ 2>/dev/null | grep -q .; then
            python3 /tmp/gen-trivyignore.py \
              --images-dir     allowlist-src/images \
              --output         .trivyignore-promote \
              --emit-findings-json allowlist-findings.json \
              --target-name    "${NAME}" \
              --target-version "${VERSION}"
            echo "allowlist-findings.json generated:"
            python3 -c "import json; d=json.load(open('allowlist-findings.json')); print(f'  {len(d)} suppressed entries')" 2>/dev/null || true
          else
            echo "No allowlist files fetched — writing empty allowlist-findings.json"
            echo '[]' > allowlist-findings.json
          fi

      # Download the Trivy report uploaded by promote-reusable so CVE findings
      # can be written to Supabase with full per-CVE detail.
      - name: Download Trivy scan report
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@7bb9ad4ec84f05efb0d4e38ea2d8eb7f3dfbeba0  # v4
        with:
          name: trivy-${{ github.event.client_payload.name }}-${{ github.event.client_payload.version }}-${{ github.run_id }}
          path: .

      - name: Write CVE findings to Supabase
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          FINDINGS_ARG=""
          if [[ -f trivy-results.json ]]; then
            FINDINGS_ARG="@trivy-results.json"
          fi
          ALLOWLIST_ARG=""
          if [[ -f allowlist-findings.json ]]; then
            ALLOWLIST_ARG="--allowlist-json @allowlist-findings.json"
          fi
          python3 scripts/supabase_ingress.py scan \
            --name          "${{ github.event.client_payload.name }}" \
            --version       "${{ github.event.client_payload.version }}" \
            --cve-total     "${{ needs.promote-core.outputs.cve_total }}" \
            --cve-critical  "${{ needs.promote-core.outputs.cve_critical }}" \
            --cve-high      "${{ needs.promote-core.outputs.cve_high }}" \
            --scanner       trivy \
            --scanned-at    "${{ needs.promote-core.outputs.promoted_at }}" \
            ${FINDINGS_ARG:+--findings-json "${FINDINGS_ARG}"} \
            ${ALLOWLIST_ARG}

      # -----------------------------------------------------------------------
      # Post-promote smoke test + Supabase writeback
      # continue-on-error: true — smoke failure is informational, not a gate.
      # -----------------------------------------------------------------------
      - name: Run post-promote smoke test
        id: smoke
        if: needs.promote-core.outputs.digest != ''
        continue-on-error: true
        env:
          DST_IMAGE: ${{ needs.promote-core.outputs.dst_image }}
          NAME:      ${{ github.event.client_payload.name }}
          VERSION:   ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail
          CATEGORY="${{ github.event.client_payload.category }}"
          if [[ "${CATEGORY}" == "builder" ]]; then
            SMOKE_SCRIPT="images/builders/${NAME}/${VERSION}/tests/smoke.sh"
          else
            SMOKE_SCRIPT="images/${NAME}/${VERSION}/tests/smoke.sh"
          fi

          PUBLIC_IMAGE="${DST_IMAGE}:${{ github.event.client_payload.base_version }}"
          [[ -n "${{ github.event.client_payload.profile }}" ]] && \
            PUBLIC_IMAGE="${DST_IMAGE}:${{ github.event.client_payload.base_version }}-${{ github.event.client_payload.profile }}"

          if [[ ! -f "${SMOKE_SCRIPT}" ]]; then
            echo "No smoke test found at ${SMOKE_SCRIPT} — skipping"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Running smoke test: ${SMOKE_SCRIPT} ${PUBLIC_IMAGE}"
          START_MS=$(($(date +%s%N)/1000000))
          SMOKE_RC=0
          SMOKE_OUT=$(bash "${SMOKE_SCRIPT}" "${PUBLIC_IMAGE}" 2>&1) || SMOKE_RC=$?
          END_MS=$(($(date +%s%N)/1000000))
          DURATION_MS=$(( END_MS - START_MS ))

          echo "$SMOKE_OUT"

          PASS_COUNT=$(grep -c '^\s*\[PASS\]' <<< "${SMOKE_OUT}" || true)
          FAIL_COUNT=$(grep -c '^\s*\[FAIL\]' <<< "${SMOKE_OUT}" || true)
          if [[ "$PASS_COUNT" -eq 0 && "$FAIL_COUNT" -eq 0 ]]; then
            PASS_COUNT=$(grep -oP '\d+ passed' <<< "${SMOKE_OUT}" | grep -oP '\d+' || echo 0)
            FAIL_COUNT=$(grep -oP '\d+ failed'  <<< "${SMOKE_OUT}" | grep -oP '\d+' || echo 0)
          fi

          if [[ "$SMOKE_RC" -eq 0 ]]; then
            OVERALL="passed"
          else
            OVERALL="failed"
          fi

          echo "status=${OVERALL}"          >> "$GITHUB_OUTPUT"
          echo "pass_count=${PASS_COUNT}"   >> "$GITHUB_OUTPUT"
          echo "fail_count=${FAIL_COUNT}"   >> "$GITHUB_OUTPUT"
          echo "duration_ms=${DURATION_MS}" >> "$GITHUB_OUTPUT"

          IMAGE_REF="${DST_IMAGE}@${{ needs.promote-core.outputs.digest }}"
          SMOKE_OUT_FILE=$(mktemp /tmp/smoke-out-XXXXXX.txt)
          printf '%s' "${SMOKE_OUT}" > "${SMOKE_OUT_FILE}"

          python3 scripts/make_smoke_result.py \
            "${SMOKE_OUT_FILE}" "${IMAGE_REF}" "${OVERALL}" \
            "${PASS_COUNT}" "${FAIL_COUNT}" "${DURATION_MS}" \
            /tmp/smoke-result.json

          rm -f "${SMOKE_OUT_FILE}"

      - name: Write smoke results to Supabase
        if: needs.promote-core.outputs.digest != '' && steps.smoke.outputs.status != 'skipped'
        continue-on-error: true
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          [[ -f /tmp/smoke-result.json ]] || { echo "No smoke-result.json — skipping"; exit 0; }

          RUN_URL="https://github.com/gwshield/images/actions/runs/${{ github.run_id }}"

          python3 scripts/supabase_ingress.py smoke \
            --name         "${{ github.event.client_payload.name }}" \
            --version      "${{ github.event.client_payload.version }}" \
            --base-version "${{ github.event.client_payload.base_version }}" \
            --profile      "${{ github.event.client_payload.profile }}" \
            --result-file  "/tmp/smoke-result.json" \
            --run-url      "${RUN_URL}" \
            --runner       "ubuntu-24.04" \
            --trigger      "post-promote"

      # -----------------------------------------------------------------------
      # Trigger readme-update workflow (via repository_dispatch to self)
      # -----------------------------------------------------------------------
      - name: Trigger README update
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api /repos/gwshield/images/dispatches \
            --method POST \
            --field event_type=registry-updated \
            --field "client_payload[reason]=promote:${{ github.event.client_payload.name }}:${{ github.event.client_payload.version }}"
          echo "readme-update dispatch sent"

      # -----------------------------------------------------------------------
      # Job summary
      # -----------------------------------------------------------------------
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Promoted: ${{ github.event.client_payload.name }} ${{ github.event.client_payload.version }}"
            echo ""
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Source | \`${{ github.event.client_payload.src_image }}:${{ github.event.client_payload.src_tag }}\` |"
            echo "| Source digest | \`${{ github.event.client_payload.src_digest }}\` |"
            echo "| Public tags | \`${{ needs.promote-core.outputs.tags }}\` |"
            echo "| Pushed digest | \`${{ needs.promote-core.outputs.digest }}\` |"
            echo "| Signed | cosign keyless (Sigstore / gwshield OIDC) |"
            echo "| SBOM | CycloneDX + SPDX attached |"
            echo "| SLSA provenance | slsaprovenance1 attested |"
            echo "| CVE total | ${{ needs.promote-core.outputs.cve_total }} (critical: ${{ needs.promote-core.outputs.cve_critical }}, high: ${{ needs.promote-core.outputs.cve_high }}) |"
            echo "| Smoke test | ${{ steps.smoke.outputs.status || 'skipped' }} (${{ steps.smoke.outputs.pass_count || 0 }} passed / ${{ steps.smoke.outputs.fail_count || 0 }} failed) |"
            echo "| registry.json | updated |"
            echo ""
            echo "### Verify"
            echo '```bash'
            echo "cosign verify --certificate-identity-regexp='https://github.com/gwshield/images.*' --certificate-oidc-issuer='https://token.actions.githubusercontent.com' ${{ needs.promote-core.outputs.dst_image }}@${{ needs.promote-core.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

# =============================================================================
# PROMOTE — Receive image promotion requests from RelicFrog/gwshield-images
# =============================================================================
# Triggered by repository_dispatch (event: promote-image) from the private
# build pipeline (RelicFrog/gwshield-images release-public workflow).
#
# Auth strategy (no broad PATs, no credential leakage):
#   - Src pull (ghcr.io/relicfrog): RELICFROG_READ_PAT — fine-grained PAT
#     scoped to RelicFrog/gwshield-images with read:packages only
#   - Dst push (ghcr.io/gwshield):  GITHUB_TOKEN — native write:packages for
#     gwshield org (this workflow runs inside gwshield/images)
#   - cosign OIDC:                  id-token: write — OIDC identity from
#     https://github.com/gwshield/images/.github/workflows/promote.yml
#
# Payload fields (client_payload — no credentials):
#   name         e.g. traefik
#   version      e.g. v3.6.9
#   base_version e.g. v3.6.9
#   profile      e.g. "" or "tls" or "cluster"
#   src_digest   e.g. sha256:abc123...  (used for signing/SBOM ref)
#   src_tag      e.g. v3.6.9 or main    (tag resolved upstream — used for copy)
#   src_image    e.g. ghcr.io/relicfrog/gwshield-traefik
#   platforms    e.g. ["linux/amd64","linux/arm64"] (from release-public.yml detection)
#                Hint only — promote.yml re-detects from the pushed destination image.
# =============================================================================

name: promote

on:
  repository_dispatch:
    types: [promote-image]

concurrency:
  group: promote-${{ github.event.client_payload.name }}-${{ github.event.client_payload.version }}
  cancel-in-progress: false

permissions:
  contents: write       # commit registry.json + trigger readme-update
  packages: write       # GITHUB_TOKEN write:packages for gwshield org
  id-token: write       # cosign OIDC keyless signing

env:
  SRC_REGISTRY: ghcr.io
  SRC_ORG:      relicfrog
  DST_REGISTRY: ghcr.io
  DST_ORG:      gwshield

jobs:
  promote:
    name: Promote ${{ github.event.client_payload.name }}:${{ github.event.client_payload.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # -----------------------------------------------------------------------
      # Unit-test supabase_ingress.py pure helpers before any DB write.
      # Tests cover slug derivation, image_type detection, version group
      # heuristic, OS tag, Trivy findings parsing, and env-guard behaviour.
      # A test failure hard-stops the promote (no continue-on-error).
      # -----------------------------------------------------------------------
      - name: Test supabase_ingress.py
        run: python3 scripts/tests/test_supabase_ingress.py


      # -----------------------------------------------------------------------
      # Unit-test gwshield-init argv protocol (v1.1) before any image promote.
      # Fetches gwshield-init-test.c from RelicFrog/gwshield-images via API,
      # compiles it with musl-gcc in Alpine, and runs 26 test cases covering
      # parse_gws_args() -- --gws-version, --gws-exec, passthrough, edge-cases.
      # continue-on-error: true — RELICFROG_READ_PAT expiry must not block promote.
      # -----------------------------------------------------------------------
      - name: Test gwshield-init (C unit tests)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELICFROG_READ_PAT }}
        run: |
          set -euo pipefail
          curl -sSfL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/RelicFrog/gwshield-images/contents/shared/banner/gwshield-init-test.c" \
            -o /tmp/gwshield-init-test.c
          docker run --rm \
            -v /tmp/gwshield-init-test.c:/src/gwshield-init-test.c:ro \
            alpine:3.21 sh -c '
              apk add --no-cache musl-dev gcc >/dev/null 2>&1
              gcc -static \
                -DGWS_SERVICE=\"testsvc\" \
                -DGWS_VERSION=\"v1.1.0\" \
                -DGWS_PROFILE=\"standard\" \
                -DGWS_BUILD_TS=\"1970-01-01T00:00:00Z\" \
                -DGWS_GIT_COMMIT=\"testcommit\" \
                -DGWS_GIT_BRANCH=\"testbranch\" \
                -DGWS_EXEC=\"/bin/true\" \
                -o /tmp/gwshield-init-test \
                /src/gwshield-init-test.c
              /tmp/gwshield-init-test
            '

      - name: Validate payload
        run: |
          set -euo pipefail
          NAME="${{ github.event.client_payload.name }}"
          VERSION="${{ github.event.client_payload.version }}"
          SRC_DIGEST="${{ github.event.client_payload.src_digest }}"
          SRC_TAG="${{ github.event.client_payload.src_tag }}"
          if [[ -z "${NAME}" || -z "${VERSION}" || -z "${SRC_DIGEST}" || -z "${SRC_TAG}" ]]; then
            echo "ERROR: missing required payload fields (name, version, src_digest, src_tag)" >&2
            exit 1
          fi
          echo "Promoting ${NAME}:${VERSION} from :${SRC_TAG} (digest: ${SRC_DIGEST})"

      - name: Install cosign
        run: |
          curl -sL -o /tmp/cosign \
            "https://github.com/sigstore/cosign/releases/download/v3.0.5/cosign-linux-amd64"
          echo "db15cc99e6e4837daabab023742aaddc3841ce57f193d11b7c3e06c8003642b2  /tmp/cosign" \
            | sha256sum -c -
          sudo install -m 0755 /tmp/cosign /usr/local/bin/cosign
          cosign version

      - name: Install skopeo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends skopeo

      # -----------------------------------------------------------------------
      # Log in to GHCR with GITHUB_TOKEN — gives write:packages for gwshield.
      # Used by cosign and syft. skopeo uses --dest-creds directly.
      # -----------------------------------------------------------------------
      - name: Log in to GHCR (gwshield — GITHUB_TOKEN)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DST_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Compute destination tags.
      # -----------------------------------------------------------------------
      - name: Compute public tags
        id: tags
        run: |
          set -euo pipefail
          DST="${{ env.DST_REGISTRY }}/${{ env.DST_ORG }}/${{ github.event.client_payload.name }}"
          BASE="${{ github.event.client_payload.base_version }}"
          PROFILE="${{ github.event.client_payload.profile }}"

          if [[ -n "${PROFILE}" ]]; then
            TAGS="${DST}:${BASE}-${PROFILE}"
          else
            TAGS="${DST}:${BASE} ${DST}:latest"
          fi

          echo "tags=${TAGS}"         >> "$GITHUB_OUTPUT"
          echo "dst_image=${DST}"     >> "$GITHUB_OUTPUT"
          echo "Public tags: ${TAGS}"

      # -----------------------------------------------------------------------
      # Copy source image to gwshield GHCR via skopeo.
      # --src-creds: RELICFROG_READ_PAT (fine-grained, read:packages only,
      #   scoped to RelicFrog/gwshield-images — the repo that owns the packages).
      # --dest-creds: GITHUB_TOKEN (native write:packages for gwshield org).
      # Source addressed by tag — GHCR resolves tag refs reliably.
      # -----------------------------------------------------------------------
      - name: Copy image to ghcr.io/gwshield (skopeo)
        id: push
        env:
          SRC_CREDS: x-access-token:${{ secrets.RELICFROG_READ_PAT }}
          DST_CREDS: x-access-token:${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SRC_IMAGE="${{ github.event.client_payload.src_image }}"
          SRC_TAG="${{ github.event.client_payload.src_tag }}"
          SRC_REF="docker://${SRC_IMAGE}:${SRC_TAG}"
          FIRST_TAG=""

          for TAG in ${{ steps.tags.outputs.tags }}; do
            echo "skopeo copy ${SRC_REF} -> docker://${TAG}"
            skopeo copy --all \
              --src-creds  "${SRC_CREDS}" \
              --dest-creds "${DST_CREDS}" \
              "${SRC_REF}" \
              "docker://${TAG}"
            [[ -z "${FIRST_TAG}" ]] && FIRST_TAG="${TAG}"
          done

          PUSHED_DIGEST=$(skopeo inspect --format '{{.Digest}}' \
            --creds "${DST_CREDS}" \
            "docker://${FIRST_TAG}" 2>/dev/null || true)

          echo "digest=${PUSHED_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "first_tag=${FIRST_TAG}"  >> "$GITHUB_OUTPUT"
          echo "Pushed digest: ${PUSHED_DIGEST}"

      # -----------------------------------------------------------------------
      # cosign keyless sign (Sigstore OIDC)
      # Identity: https://github.com/gwshield/images/.github/workflows/promote.yml
      # -----------------------------------------------------------------------
      # -----------------------------------------------------------------------
      # Collect per-platform image sizes and platform list.
      # Inspects the manifest list that was just pushed.
      #   --raw  → OCI manifest JSON → sum layer sizes → image_size_bytes (compressed)
      # skopeo inspect (no --raw) → LayersData[].Size sum → runnable_size_bytes
      # Gracefully skipped if the inspect fails (e.g. single-arch image).
      # -----------------------------------------------------------------------
      - name: Collect per-platform metadata
        id: plat
        env:
          DST_CREDS: x-access-token:${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FIRST_TAG="${{ steps.push.outputs.first_tag }}"
          [[ -z "${FIRST_TAG}" ]] && { echo "No tag — skip platform metadata"; exit 0; }

          PLATFORMS_JSON="[]"
          IMAGE_SIZE_JSON="{}"
          RUNNABLE_SIZE_JSON="{}"
          SBOM_REFS_JSON="{}"

          # Inspect the manifest list — determine if this is a multi-arch image
          RAW_MANIFEST=$(skopeo inspect --raw --creds "${DST_CREDS}"             "docker://${FIRST_TAG}" 2>/dev/null || true)

          if [[ -z "${RAW_MANIFEST}" ]]; then
            echo "Could not inspect manifest — falling back to no platform metadata"
            _D=$(openssl rand -hex 8)
            { echo "platforms_json<<${_D}";     echo "${PLATFORMS_JSON}";     echo "${_D}"; } >> "$GITHUB_OUTPUT"
            { echo "image_size_json<<${_D}";    echo "${IMAGE_SIZE_JSON}";    echo "${_D}"; } >> "$GITHUB_OUTPUT"
            { echo "runnable_size_json<<${_D}"; echo "${RUNNABLE_SIZE_JSON}"; echo "${_D}"; } >> "$GITHUB_OUTPUT"
            { echo "sbom_refs_json<<${_D}";     echo "${SBOM_REFS_JSON}";     echo "${_D}"; } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if this is a manifest list (mediaType contains 'index' or 'manifest.list')
          IS_INDEX=$(echo "${RAW_MANIFEST}" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          mt=d.get('mediaType','')
          print('true' if ('index' in mt or 'list' in mt) else 'false')
          " 2>/dev/null || echo "false")

          if [[ "${IS_INDEX}" == "true" ]]; then
            echo "Manifest list detected — collecting per-platform sizes"
            PLAT_DATA=$(echo "${RAW_MANIFEST}" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          manifests=d.get('manifests',[])
          result=[]
          for m in manifests:
              p=m.get('platform',{})
              os_=p.get('os','')
              arch=p.get('architecture','')
              variant=p.get('variant','')
               if os_ and arch and os_ != 'unknown' and arch != 'unknown':
                   plat=f'{os_}/{arch}'
                   if variant:
                       plat+=f'/{variant}'
                   result.append({'platform':plat,'digest':m.get('digest',''),'size':m.get('size',0)})
          print(json.dumps(result))
          " 2>/dev/null || echo "[]")

            FIRST_TAG_BASE="${{ steps.push.outputs.first_tag }}"
            DST_IMAGE="${{ steps.tags.outputs.dst_image }}"

            PLAT_LIST=$(echo "${PLAT_DATA}" | python3 -c "
          import json,sys
          d=json.loads(sys.stdin.read())
          print(json.dumps([x['platform'] for x in d]))
          " 2>/dev/null || echo "[]")

            # Build size maps via per-platform skopeo inspect
            IMG_MAP="{}"
            RUN_MAP="{}"
            for ROW in $(echo "${PLAT_DATA}" | python3 -c "
          import json,sys
          d=json.loads(sys.stdin.read())
          for x in d:
              print(x['platform']+'|'+x['digest'])
          " 2>/dev/null); do
              PLAT="${ROW%%|*}"
              DIGEST="${ROW##*|}"
              [[ -z "${DIGEST}" ]] && continue

              # compressed size (--raw → sum layers[].size)
              IMG_SIZE=$(skopeo inspect --raw --creds "${DST_CREDS}"                 "docker://${DST_IMAGE}@${DIGEST}" 2>/dev/null | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(sum(l.get('size',0) for l in d.get('layers',[])))
          " 2>/dev/null || echo "0")

              # uncompressed size (no --raw → LayersData[].Size)
              RUN_SIZE=$(skopeo inspect --creds "${DST_CREDS}"                 "docker://${DST_IMAGE}@${DIGEST}" 2>/dev/null | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(sum(l.get('Size',0) for l in d.get('LayersData',[])))
          " 2>/dev/null || echo "0")

              IMG_MAP=$(echo "${IMG_MAP}" | jq -c --arg k "${PLAT}" --argjson v "${IMG_SIZE}" '. + {($k): $v}')
              RUN_MAP=$(echo "${RUN_MAP}" | jq -c --arg k "${PLAT}" --argjson v "${RUN_SIZE}" '. + {($k): $v}')

              echo "  ${PLAT}: image_size=${IMG_SIZE} runnable_size=${RUN_SIZE}"
            done

            if [[ "${PLAT_LIST}" == "[]" || -z "${PLAT_LIST}" ]]; then
              # All manifests were attestation-only (unknown/unknown) — treat as single-arch
              echo "No real platform manifests after filtering — treating as single-arch linux/amd64"
              IS_INDEX="false"
            else
              PLATFORMS_JSON="${PLAT_LIST}"
              IMAGE_SIZE_JSON="${IMG_MAP}"
              RUNNABLE_SIZE_JSON="${RUN_MAP}"
            fi
          fi

          if [[ "${IS_INDEX}" == "false" ]]; then
            # Single-arch image (or index with only attestation manifests) — collect sizes for linux/amd64
            echo "Single-arch manifest — collecting sizes for linux/amd64"
            DIGEST="${{ steps.push.outputs.digest }}"
            DST_IMAGE="${{ steps.tags.outputs.dst_image }}"

            # If RAW_MANIFEST is an index (attestation-only case), extract the linux/amd64
            # per-platform digest and use that for --raw; otherwise use DIGEST directly.
            PLAT_DIGEST=$(echo "${RAW_MANIFEST}" | python3 -c "
          import json,sys
          d=json.loads(sys.stdin.read())
          mt=d.get('mediaType','')
          if 'index' not in mt and 'list' not in mt:
              print('')
          else:
              for m in d.get('manifests',[]):
                  p=m.get('platform',{})
                  if p.get('os')=='linux' and p.get('architecture')=='amd64':
                      print(m.get('digest',''))
                      break
          " 2>/dev/null || echo "")

            # Use per-platform digest when available, else fall back to the manifest digest
            if [[ -n "${PLAT_DIGEST}" ]]; then
              INSPECT_REF="docker://${DST_IMAGE}@${PLAT_DIGEST}"
            else
              INSPECT_REF="docker://${DST_IMAGE}@${DIGEST}"
            fi

            IMG_SIZE=$(skopeo inspect --raw --creds "${DST_CREDS}" "${INSPECT_REF}" 2>/dev/null | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(sum(l.get('size',0) for l in d.get('layers',[])))
          " 2>/dev/null || echo "0")

            RUN_SIZE=$(skopeo inspect --creds "${DST_CREDS}" "${INSPECT_REF}" 2>/dev/null | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print(sum(l.get('Size',0) for l in d.get('LayersData',[])))
          " 2>/dev/null || echo "0")

            PLATFORMS_JSON='["linux/amd64"]'
            IMAGE_SIZE_JSON=$(jq -cn --argjson v "${IMG_SIZE}" '{"linux/amd64": $v}')
            RUNNABLE_SIZE_JSON=$(jq -cn --argjson v "${RUN_SIZE}" '{"linux/amd64": $v}')
            echo "  linux/amd64: image_size=${IMG_SIZE} runnable_size=${RUN_SIZE}"
          fi

          _D=$(openssl rand -hex 8)
          { echo "platforms_json<<${_D}";     echo "${PLATFORMS_JSON}";     echo "${_D}"; } >> "$GITHUB_OUTPUT"
          { echo "image_size_json<<${_D}";    echo "${IMAGE_SIZE_JSON}";    echo "${_D}"; } >> "$GITHUB_OUTPUT"
          { echo "runnable_size_json<<${_D}"; echo "${RUNNABLE_SIZE_JSON}"; echo "${_D}"; } >> "$GITHUB_OUTPUT"
          { echo "sbom_refs_json<<${_D}";     echo "${SBOM_REFS_JSON}";     echo "${_D}"; } >> "$GITHUB_OUTPUT"
          echo "Platforms: ${PLATFORMS_JSON}"

      - name: Sign public image (cosign keyless)
        run: |
          set -euo pipefail
          DST_IMAGE="${{ steps.tags.outputs.dst_image }}"
          DIGEST="${{ steps.push.outputs.digest }}"
          [[ -z "${DIGEST}" ]] && { echo "WARNING: no digest -- skip cosign"; exit 0; }
          echo "Signing ${DST_IMAGE}@${DIGEST} ..."
          cosign sign --yes "${DST_IMAGE}@${DIGEST}"

      - name: Verify cosign signature
        run: |
          set -euo pipefail
          DST_IMAGE="${{ steps.tags.outputs.dst_image }}"
          DIGEST="${{ steps.push.outputs.digest }}"
          [[ -z "${DIGEST}" ]] && { echo "No digest -- skip verify"; exit 0; }
          cosign verify \
            --certificate-identity-regexp="https://github.com/gwshield/images.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${DST_IMAGE}@${DIGEST}"

      # -----------------------------------------------------------------------
      # SBOM: CycloneDX + SPDX via syft, attested with cosign
      # -----------------------------------------------------------------------
      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate and attest SBOM
        id: sbom
        continue-on-error: true
        run: |
          set -euo pipefail
          DST_IMAGE="${{ steps.tags.outputs.dst_image }}"
          DIGEST="${{ steps.push.outputs.digest }}"
          NAME="${{ github.event.client_payload.name }}"
          VERSION="${{ github.event.client_payload.version }}"
          [[ -z "${DIGEST}" ]] && { echo "No digest -- skip SBOM"; exit 0; }
          mkdir -p sbom-out

          PLATFORMS_JSON="${{ steps.plat.outputs.platforms_json }}"
          SBOM_REFS="{}"

          # If we have per-platform platform list, attest SBOM per platform digest
          if [[ -n "${PLATFORMS_JSON}" && "${PLATFORMS_JSON}" != "[]" ]]; then
            RAW_MANIFEST=$(skopeo inspect --raw               --creds "x-access-token:${{ secrets.GITHUB_TOKEN }}"               "docker://${DST_IMAGE}@${DIGEST}" 2>/dev/null || true)
            IS_INDEX=$(echo "${RAW_MANIFEST}" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          mt=d.get('mediaType','')
          print('true' if ('index' in mt or 'list' in mt) else 'false')
          " 2>/dev/null || echo "false")

            if [[ "${IS_INDEX}" == "true" ]]; then
              PLAT_DIGESTS=$(echo "${RAW_MANIFEST}" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for m in d.get('manifests',[]):
              p=m.get('platform',{})
              os_=p.get('os','')
              arch=p.get('architecture','')
               if os_ and arch and os_ != 'unknown' and arch != 'unknown':
                   plat=f'{os_}/{arch}'
                   print(plat+'|'+m.get('digest',''))
          " 2>/dev/null || true)

              for ROW in $PLAT_DIGESTS; do
                PLAT="${ROW%%|*}"
                PDIGEST="${ROW##*|}"
                [[ -z "${PDIGEST}" ]] && continue
                PLAT_SAFE="${PLAT//\//-}"

                syft "${DST_IMAGE}@${PDIGEST}" \
                  --output spdx-json=sbom-out/sbom-${NAME}-${VERSION}-${PLAT_SAFE}-spdx.json

                cosign attest --yes \
                  --predicate sbom-out/sbom-${NAME}-${VERSION}-${PLAT_SAFE}-spdx.json \
                  --type spdx \
                  "${DST_IMAGE}@${PDIGEST}"

                SBOM_REF="${DST_IMAGE}@${PDIGEST}"
                SBOM_REFS=$(echo "${SBOM_REFS}" | jq -c --arg k "${PLAT}" --arg v "${SBOM_REF}" '. + {($k): $v}')
                echo "  SBOM attested for ${PLAT}: ${DST_IMAGE}@${PDIGEST}"
              done
            else
              # Single-arch — attest to manifest digest
              syft "${DST_IMAGE}@${DIGEST}" \
                --output spdx-json=sbom-out/sbom-${NAME}-${VERSION}-spdx.json
              cosign attest --yes \
                --predicate sbom-out/sbom-${NAME}-${VERSION}-spdx.json \
                --type spdx \
                "${DST_IMAGE}@${DIGEST}"
              SBOM_REFS=$(jq -cn --arg v "${DST_IMAGE}@${DIGEST}" '{"linux/amd64": $v}')
            fi
          else
            # Legacy / fallback — single SBOM on manifest list digest
            syft "${DST_IMAGE}@${DIGEST}" \
              --output cyclonedx-json=sbom-out/sbom-${NAME}-${VERSION}-cyclonedx.json

            syft "${DST_IMAGE}@${DIGEST}" \
              --output spdx-json=sbom-out/sbom-${NAME}-${VERSION}-spdx.json

            cosign attest --yes \
              --predicate sbom-out/sbom-${NAME}-${VERSION}-cyclonedx.json \
              --type cyclonedx \
              "${DST_IMAGE}@${DIGEST}"

            cosign attest --yes \
              --predicate sbom-out/sbom-${NAME}-${VERSION}-spdx.json \
              --type spdx \
              "${DST_IMAGE}@${DIGEST}"
          fi

          _D=$(openssl rand -hex 8)
          { echo "sbom_refs_json<<${_D}"; echo "${SBOM_REFS}"; echo "${_D}"; } >> "$GITHUB_OUTPUT"
          echo "SBOM refs: ${SBOM_REFS}"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.event.client_payload.name }}-${{ github.event.client_payload.version }}
          path: sbom-out/
          retention-days: 365
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # CVE scan -- Trivy on the public image (digest-pinned).
      # Runs after the image is pushed so we scan exactly what is public.
      # Findings are recorded in registry.json -- they do NOT gate the promote
      # (the private build pipeline already enforces the gate on push events).
      # Uses trivy-action (JSON output) + a parse step to extract counts.
      # -----------------------------------------------------------------------
      - name: Trivy CVE scan (JSON)
        id: trivy_scan
        if: steps.push.outputs.digest != ''
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: ${{ steps.tags.outputs.dst_image }}@${{ steps.push.outputs.digest }}
          format: json
          output: trivy-results.json
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: false
          exit-code: '0'
          timeout: '15m0s'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Parse Trivy results
        id: trivy
        if: always()
        run: |
          set -euo pipefail
          if [[ ! -f trivy-results.json ]]; then
            echo "total=0"    >> "$GITHUB_OUTPUT"
            echo "critical=0" >> "$GITHUB_OUTPUT"
            echo "high=0"     >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TOTAL=$(python3 -c "
          import json
          d = json.load(open('trivy-results.json'))
          print(sum(len(r.get('Vulnerabilities') or []) for r in d.get('Results', [])))
          ")
          CRITICAL=$(python3 -c "
          import json
          d = json.load(open('trivy-results.json'))
          print(sum(1 for r in d.get('Results', []) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='CRITICAL'))
          ")
          HIGH=$(python3 -c "
          import json
          d = json.load(open('trivy-results.json'))
          print(sum(1 for r in d.get('Results', []) for v in (r.get('Vulnerabilities') or []) if v.get('Severity')=='HIGH'))
          ")
          echo "Trivy: total=${TOTAL} critical=${CRITICAL} high=${HIGH}"
          echo "total=${TOTAL}"       >> "$GITHUB_OUTPUT"
          echo "critical=${CRITICAL}" >> "$GITHUB_OUTPUT"
          echo "high=${HIGH}"         >> "$GITHUB_OUTPUT"

      - name: Upload Trivy scan report
        if: always() && steps.push.outputs.digest != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ github.event.client_payload.name }}-${{ github.event.client_payload.version }}-${{ github.run_id }}
          path: trivy-results.json
          retention-days: 90
          if-no-files-found: ignore

      # -----------------------------------------------------------------------
      # Update registry.json via GitHub Contents API (atomic read-modify-write)
      # No git push -- avoids race conditions when 13 jobs run in parallel.
      # The API returns 409 if the SHA is stale; we retry with the fresh SHA.
      # Both promote and scan sub-commands run in the same retry loop so the
      # file is only written once per attempt.
      # -----------------------------------------------------------------------
      - name: Update registry.json (via GitHub API)
        id: registry
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NAME="${{ github.event.client_payload.name }}"
          VERSION="${{ github.event.client_payload.version }}"
          BASE_VERSION="${{ github.event.client_payload.base_version }}"
          PROFILE="${{ github.event.client_payload.profile }}"
          CATEGORY="${{ github.event.client_payload.category }}"
          DIGEST="${{ steps.push.outputs.digest }}"
          TAGS="${{ steps.tags.outputs.tags }}"
          PROMOTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          COSIGN_IDENTITY="https://github.com/gwshield/images/.github/workflows/promote.yml@refs/heads/main"
          COMMIT_MSG="chore(registry): promote ${NAME}:${VERSION} [skip ci]"

          CVE_TOTAL="${{ steps.trivy.outputs.total }}"
          CVE_CRITICAL="${{ steps.trivy.outputs.critical }}"
          CVE_HIGH="${{ steps.trivy.outputs.high }}"
          SCANNED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          MAX=8
          for i in $(seq 1 $MAX); do
            echo "Attempt ${i}/${MAX} -- fetching current registry.json from API..."

            API_RESP=$(gh api repos/gwshield/images/contents/registry.json 2>/dev/null || echo "NOT_FOUND")

            if echo "${API_RESP}" | grep -q "NOT_FOUND"; then
              CURRENT_CONTENT=''
              FILE_SHA=''
            else
              CURRENT_CONTENT=$(echo "${API_RESP}" | python3 -c "import sys,json,base64; d=json.load(sys.stdin); print(base64.b64decode(d['content']).decode())")
              FILE_SHA=$(echo "${API_RESP}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['sha'])")
            fi

            if [[ -n "${CURRENT_CONTENT}" ]]; then
              echo "${CURRENT_CONTENT}" > registry.json
            fi

            python3 scripts/update-registry.py promote \
              --name            "${NAME}" \
              --version         "${VERSION}" \
              --base-version    "${BASE_VERSION}" \
              --profile         "${PROFILE}" \
              --category        "${CATEGORY:-runtime}" \
              --digest          "${DIGEST}" \
              --tags            "${TAGS}" \
              --cosign-identity "${COSIGN_IDENTITY}" \
              --promoted-at     "${PROMOTED_AT}"

            python3 scripts/update-registry.py scan \
              --name         "${NAME}" \
              --version      "${VERSION}" \
              --cve-total    "${CVE_TOTAL:-0}" \
              --cve-critical "${CVE_CRITICAL:-0}" \
              --cve-high     "${CVE_HIGH:-0}" \
              --scanner      trivy \
              --scanned-at   "${SCANNED_AT}"

            NEW_CONTENT=$(base64 < registry.json | tr -d '\n')

            PAYLOAD=$(python3 -c "import json,sys; d={'message':sys.argv[1],'content':sys.argv[2],'branch':'main'}; d.update({'sha':sys.argv[3]} if sys.argv[3] else {}); print(json.dumps(d))" "${COMMIT_MSG}" "${NEW_CONTENT}" "${FILE_SHA}")

            HTTP_STATUS=$(echo "${PAYLOAD}" | gh api repos/gwshield/images/contents/registry.json \
              --method PUT \
              --input - \
              --jq '.commit.sha' 2>&1) && EXIT=$? || EXIT=$?

            if [[ $EXIT -eq 0 ]]; then
              echo "registry.json updated successfully on attempt ${i} (commit: ${HTTP_STATUS})"
              echo "promoted_at=${PROMOTED_AT}" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "API write failed (attempt ${i}/${MAX}, likely stale SHA) -- retrying..."
            sleep $((i * 2))
          done

          echo "ERROR: could not update registry.json after ${MAX} attempts" >&2
          exit 1

      # -----------------------------------------------------------------------
      # Supabase writeback — upsert image/version/snapshot into gwshield-hub
      # Uses service role key (bypasses RLS — pipeline writes are trusted)
      # continue-on-error: true — Supabase outage must not block promote
      # -----------------------------------------------------------------------
      - name: Upsert image into Supabase
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          _PLATFORMS_JSON: ${{ steps.plat.outputs.platforms_json }}
          _IMAGE_SIZE_JSON: ${{ steps.plat.outputs.image_size_json }}
          _RUNNABLE_SIZE_JSON: ${{ steps.plat.outputs.runnable_size_json }}
          _SBOM_REFS_JSON: ${{ steps.sbom.outputs.sbom_refs_json }}
        run: |
          set -euo pipefail
          PLATFORMS_JSON="${_PLATFORMS_JSON}"
          IMAGE_SIZE_JSON="${_IMAGE_SIZE_JSON}"
          RUNNABLE_SIZE_JSON="${_RUNNABLE_SIZE_JSON}"
          SBOM_REFS_JSON="${_SBOM_REFS_JSON}"

          # Build optional platform args — only pass when we have platform data
          PLAT_ARGS=()
          if [[ -n "${PLATFORMS_JSON}" && "${PLATFORMS_JSON}" != "[]" ]]; then
            PLAT_ARGS+=(--platforms "${PLATFORMS_JSON}")
          fi
          if [[ -n "${IMAGE_SIZE_JSON}" && "${IMAGE_SIZE_JSON}" != "{}" ]]; then
            PLAT_ARGS+=(--image-size-json "${IMAGE_SIZE_JSON}")
          fi
          if [[ -n "${RUNNABLE_SIZE_JSON}" && "${RUNNABLE_SIZE_JSON}" != "{}" ]]; then
            PLAT_ARGS+=(--runnable-size-json "${RUNNABLE_SIZE_JSON}")
          fi
          if [[ -n "${SBOM_REFS_JSON}" && "${SBOM_REFS_JSON}" != "{}" ]]; then
            PLAT_ARGS+=(--sbom-refs-json "${SBOM_REFS_JSON}")
          fi

          python3 scripts/supabase_ingress.py promote \
            --name            "${{ github.event.client_payload.name }}" \
            --version         "${{ github.event.client_payload.version }}" \
            --base-version    "${{ github.event.client_payload.base_version }}" \
            --profile         "${{ github.event.client_payload.profile }}" \
            --digest          "${{ steps.push.outputs.digest }}" \
            --tags            "${{ steps.tags.outputs.tags }}" \
            --cosign-identity "https://github.com/gwshield/images/.github/workflows/promote.yml@refs/heads/main" \
            --promoted-at     "${{ steps.registry.outputs.promoted_at }}" \
            --image-type      "${{ github.event.client_payload.image_type }}" \
            "${PLAT_ARGS[@]}"

      # Fetch allowlist for this image from RelicFrog/gwshield-images so suppressed
      # CVEs can be written transparently alongside real Trivy findings.
      # gen-trivyignore.py + all allowlist.yaml files are fetched via API.
      # Gracefully skipped if RELICFROG_READ_PAT is unavailable or fetch fails.
      - name: Generate allowlist-findings.json
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELICFROG_READ_PAT }}
        run: |
          set -euo pipefail
          NAME="${{ github.event.client_payload.name }}"
          VERSION="${{ github.event.client_payload.version }}"

          # Fetch gen-trivyignore.py from source repo
          curl -sSfL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3.raw" \
            "https://api.github.com/repos/RelicFrog/gwshield-images/contents/shared/scripts/gen-trivyignore.py" \
            -o /tmp/gen-trivyignore.py

          # Fetch all allowlist.yaml files and reconstruct the images/ tree locally
          mkdir -p allowlist-src
          python3 - <<'PYEOF'
          import json, os, base64, urllib.request, urllib.error

          token = os.environ["GH_TOKEN"]
          name  = os.environ["NAME"]

          def gh_get(path):
              url = f"https://api.github.com/repos/RelicFrog/gwshield-images/contents/{path}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github.v3+json",
              })
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def fetch_file(api_path, local_path):
              data = gh_get(api_path)
              content = base64.b64decode(data["content"])
              os.makedirs(os.path.dirname(local_path), exist_ok=True)
              with open(local_path, "wb") as f:
                  f.write(content)
              print(f"  fetched {api_path} -> {local_path}")

          # Discover all allowlist.yaml under images/<name>*/
          try:
              top = gh_get("images")
          except Exception as e:
              print(f"Could not list images/: {e}")
              raise

          for entry in top:
              img_name = entry["name"]
              if not img_name.startswith(name):
                  continue
              # List versions under this image dir
              try:
                  versions = gh_get(f"images/{img_name}")
              except Exception:
                  continue
              for ver_entry in versions:
                  ver = ver_entry["name"]
                  allowlist_path = f"images/{img_name}/{ver}/scan/allowlist.yaml"
                  local_path     = f"allowlist-src/{allowlist_path}"
                  try:
                      fetch_file(allowlist_path, local_path)
                  except Exception:
                      pass  # no allowlist for this version — skip silently
          PYEOF

          # Run gen-trivyignore.py against the fetched allowlist tree
          if ls allowlist-src/images/ 2>/dev/null | grep -q .; then
            python3 /tmp/gen-trivyignore.py \
              --images-dir     allowlist-src/images \
              --output         .trivyignore-promote \
              --emit-findings-json allowlist-findings.json \
              --target-name    "${NAME}" \
              --target-version "${VERSION}"
            echo "allowlist-findings.json generated:"
            python3 -c "import json; d=json.load(open('allowlist-findings.json')); print(f'  {len(d)} suppressed entries')" 2>/dev/null || true
          else
            echo "No allowlist files fetched — writing empty allowlist-findings.json"
            echo '[]' > allowlist-findings.json
          fi

      # Write structured CVE findings into cve_findings table.
      # Passes the raw trivy-results.json so the ingress script can extract
      # full per-CVE detail (severity, package, fixed_version, cvss, layer).
      # Suppressed CVEs from allowlist are merged in via --allowlist-json.
      # Gracefully skipped if cve_findings table migration is not yet applied.
      - name: Write CVE findings to Supabase
        if: always()
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FINDINGS_ARG=""
          if [[ -f trivy-results.json ]]; then
            FINDINGS_ARG="@trivy-results.json"
          fi
          ALLOWLIST_ARG=""
          if [[ -f allowlist-findings.json ]]; then
            ALLOWLIST_ARG="--allowlist-json @allowlist-findings.json"
          fi
          python3 scripts/supabase_ingress.py scan \
            --name          "${{ github.event.client_payload.name }}" \
            --version       "${{ github.event.client_payload.version }}" \
            --cve-total     "${{ steps.trivy.outputs.total }}" \
            --cve-critical  "${{ steps.trivy.outputs.critical }}" \
            --cve-high      "${{ steps.trivy.outputs.high }}" \
            --scanner       trivy \
            --scanned-at    "${{ steps.registry.outputs.promoted_at }}" \
            ${FINDINGS_ARG:+--findings-json "${FINDINGS_ARG}"} \
            ${ALLOWLIST_ARG}

      # -----------------------------------------------------------------------
      # Trigger readme-update workflow (via repository_dispatch to self)
      # -----------------------------------------------------------------------
      - name: Trigger README update
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api /repos/gwshield/images/dispatches \
            --method POST \
            --field event_type=registry-updated \
            --field "client_payload[reason]=promote:${{ github.event.client_payload.name }}:${{ github.event.client_payload.version }}"
          echo "readme-update dispatch sent"

      # -----------------------------------------------------------------------
      # Job summary
      # -----------------------------------------------------------------------
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Promoted: ${{ github.event.client_payload.name }} ${{ github.event.client_payload.version }}"
            echo ""
            echo "| Item | Value |"
            echo "|---|---|"
            echo "| Source | \`${{ github.event.client_payload.src_image }}:${{ github.event.client_payload.src_tag }}\` |"
            echo "| Source digest | \`${{ github.event.client_payload.src_digest }}\` |"
            echo "| Public tags | \`${{ steps.tags.outputs.tags }}\` |"
            echo "| Pushed digest | \`${{ steps.push.outputs.digest }}\` |"
            echo "| Signed | cosign keyless (Sigstore / gwshield OIDC) |"
            echo "| SBOM | CycloneDX + SPDX attached |"
            echo "| CVE total | ${{ steps.trivy.outputs.total }} (critical: ${{ steps.trivy.outputs.critical }}, high: ${{ steps.trivy.outputs.high }}) |"
            echo "| registry.json | updated |"
            echo ""
            echo "### Verify"
            echo '```bash'
            echo "cosign verify --certificate-identity-regexp='https://github.com/gwshield/images.*' --certificate-oidc-issuer='https://token.actions.githubusercontent.com' ${{ steps.tags.outputs.dst_image }}@${{ steps.push.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

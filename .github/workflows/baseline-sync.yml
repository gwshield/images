---
# =============================================================================
# baseline-sync.yml — GWShield Baseline Image Sync
# =============================================================================
#
# Mirrors upstream OS and toolchain base images into ghcr.io/gwshield to:
#   - Eliminate Docker Hub rate limits in RelicFrog/gwshield-images CI
#   - Provide publicly verifiable, Trivy-scanned, cosign-signed base images
#   - Give Hub users full transparency on the build foundations of every image
#
# Each sync job:
#   1. Reads versions.env from RelicFrog/gwshield-images (via API)
#   2. Resolves current upstream digest — skips if unchanged
#   3. Trivy CRITICAL scan — blocks sync and opens issue if found
#   4. skopeo copy --all (multi-platform) upstream → ghcr.io/gwshield/<name>:<tag>
#   5. cosign keyless sign (OIDC, Rekor transparency log)
#   6. Dispatches digest-update to RelicFrog/gwshield-images if digest changed
#   7. Writes sync result to Supabase via supabase_ingress.py (continue-on-error)
#
# Triggers:
#   - Weekly: Monday 04:00 UTC
#   - Manual: workflow_dispatch (optional slug filter + force flag)
#   - repository_dispatch: baseline-sync (triggered by RelicFrog/gwshield-images)
#
# Runners: Blacksmith 2vcpu (same as promote.yml)
# =============================================================================

name: baseline-sync

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Sync only this slug (e.g. alpine-3.22). Empty = all.'
        required: false
        default: ''
      force:
        description: 'Force re-sync even if digest unchanged'
        required: false
        default: 'false'
  repository_dispatch:
    types: [baseline-sync]

concurrency:
  group: baseline-sync
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  issues: write

env:
  DST_REGISTRY: ghcr.io
  DST_ORG:      gwshield
  # Baseline definitions live in the private build repo
  SRC_REPO: RelicFrog/gwshield-images

jobs:

  # ---------------------------------------------------------------------------
  # Discover: read all versions.env from RelicFrog/gwshield-images
  # ---------------------------------------------------------------------------
  discover:
    name: Discover baseline images
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sync matrix
        id: matrix
        run: |
          set -euo pipefail
          FILTER="${{ github.event.inputs.slug || github.event.client_payload.slug || '' }}"

          SLUGS=$(find images/baseline -name "versions.env" | sort | while read f; do basename "$(dirname "$f")"; done)

          if [[ -z "$SLUGS" ]]; then
            echo "ERROR: No baseline slugs found under images/baseline/"
            exit 1
          fi

          JSON=$(echo "$SLUGS" | python3 -c "
          import json,sys
          slugs=[l.strip() for l in sys.stdin if l.strip()]
          filt='${FILTER}'
          if filt:
              slugs=[s for s in slugs if s==filt]
          print(json.dumps({'include':[{'slug':s} for s in slugs]}))
          ")
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          COUNT=$(echo "$JSON" | python3 -c "import json,sys; print(len(json.load(sys.stdin)['include']))")
          echo "Discovered: ${COUNT} baselines"  # ---------------------------------------------------------------------------
  # Sync: one job per baseline image
  # ---------------------------------------------------------------------------
  sync:
    name: Sync ${{ matrix.slug }}
    needs: discover
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    permissions:
      contents: read
      packages: write
      id-token: write
      issues: write

    steps:
      # ── Checkout + load local versions.env (no PAT needed) ──────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load baseline config
        id: cfg
        run: |
          set -euo pipefail
          ENVFILE="images/baseline/${{ matrix.slug }}/versions.env"
          [[ -f "$ENVFILE" ]] || { echo "ERROR: $ENVFILE not found"; exit 1; }
          while IFS='=' read -r key val; do
            [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue
            echo "${key}=${val}" >> "$GITHUB_OUTPUT"
          done < "$ENVFILE"
          echo "---"
          grep "^BASELINE_" "$ENVFILE" | grep -v DIGEST

      # ── Install skopeo ────────────────────────────────────────────────────
      - name: Install skopeo
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq skopeo

      # ── Install cosign (curl + verify, same pattern as promote.yml) ───────
      - name: Install cosign
        run: |
          COSIGN_VERSION="v2.4.3"
          curl -fsSL \
            "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /tmp/cosign
          chmod +x /tmp/cosign
          sudo mv /tmp/cosign /usr/local/bin/cosign
          cosign version 2>/dev/null | head -1

      # ── Check if mirror already exists + determine src_ref ─────────────
      - name: Resolve upstream digest
        id: resolve
        run: |
          set -euo pipefail
          IMG="${{ steps.cfg.outputs.BASELINE_UPSTREAM_IMAGE }}"
          TAG="${{ steps.cfg.outputs.BASELINE_UPSTREAM_TAG }}"
          DIGEST="${{ steps.cfg.outputs.BASELINE_UPSTREAM_DIGEST }}"
          MIRROR="${{ steps.cfg.outputs.BASELINE_MIRROR_IMAGE }}"
          MIRROR_TAG="${{ steps.cfg.outputs.BASELINE_MIRROR_TAG }}"
          FORCE="${{ github.event.inputs.force || github.event.client_payload.force || 'false' }}"

          # Source ref — digest-only (skopeo rejects tag+digest combined references)
          if echo "$IMG" | grep -q "^gcr\.io"; then
            SRC_REF="docker://${IMG}@${DIGEST}"
          else
            SRC_REF="docker://docker.io/library/${IMG}@${DIGEST}"
          fi

          echo "pinned_digest=${DIGEST}"  >> "$GITHUB_OUTPUT"
          echo "current_digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "src_ref=${SRC_REF}"       >> "$GITHUB_OUTPUT"

          # Check if mirror already exists in ghcr.io/gwshield
          MIRROR_EXISTS=$(skopeo inspect \
            --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker://${MIRROR}:${MIRROR_TAG}" >/dev/null 2>&1 && echo "true" || echo "false")

          if [[ "$MIRROR_EXISTS" == "true" && "$FORCE" != "true" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Mirror ${MIRROR}:${MIRROR_TAG} already exists — skip (use force=true to re-sync)"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            [[ "$MIRROR_EXISTS" == "false" ]] && \
              echo "Mirror not yet in ghcr.io/gwshield — syncing from upstream" || \
              echo "Force re-sync requested"
          fi

      # ── Trivy CRITICAL scan ───────────────────────────────────────────────
      # Pull via skopeo first (supports digest-pinned pulls without Docker Hub auth),
      # then scan the local OCI layout with Trivy.
      - name: Pull image for Trivy scan
        id: pull
        if: steps.resolve.outputs.changed == 'true'
        run: |
          set -euo pipefail
          SRC="${{ steps.resolve.outputs.src_ref }}"
          OCI_DIR="/tmp/baseline-oci-${{ matrix.slug }}"

          echo "Pulling ${SRC} → ${OCI_DIR}"
          skopeo copy             --src-no-creds             --override-os linux             --override-arch amd64             "${SRC}"             "oci:${OCI_DIR}"
          echo "oci_dir=${OCI_DIR}" >> "$GITHUB_OUTPUT"
          echo "Pull complete"

      - name: Trivy scan local OCI image
        id: trivy
        if: steps.resolve.outputs.changed == 'true'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          input: ${{ steps.pull.outputs.oci_dir }}
          format: json
          output: trivy-${{ matrix.slug }}.json
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Evaluate CVE gate
        id: cve
        if: steps.resolve.outputs.changed == 'true'
        run: |
          python3 - << 'PYEOF'
          import json, sys, os
          path = f"trivy-{os.environ['SLUG']}.json"
          try:
              data = json.load(open(path))
          except Exception as e:
              print(f"WARNING: {e}")
              open(os.environ['GITHUB_OUTPUT'],'a').write("cve_blocked=false\ncritical=0\nhigh=0\n")
              sys.exit(0)
          crit = sum(
              1 for r in data.get('Results',[])
              for v in r.get('Vulnerabilities',[])
              if v.get('Severity')=='CRITICAL' and v.get('FixedVersion')
          )
          high = sum(
              1 for r in data.get('Results',[])
              for v in r.get('Vulnerabilities',[])
              if v.get('Severity')=='HIGH' and v.get('FixedVersion')
          )
          print(f"CRITICAL={crit}  HIGH={high}")
          with open(os.environ['GITHUB_OUTPUT'],'a') as f:
              f.write(f"cve_blocked={'true' if crit else 'false'}\n")
              f.write(f"critical={crit}\nhigh={high}\n")
          if crit:
              print(f"::error::CRITICAL CVEs found — sync blocked")
          PYEOF
        env:
          SLUG: ${{ matrix.slug }}

      - name: Open issue on CVE block
        if: >-
          always() && steps.resolve.outputs.changed == 'true' &&
          steps.cve.outputs.cve_blocked == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `[baseline-sync] CVE gate blocked: ${{ matrix.slug }}`,
              labels: ['security','baseline'],
              body: [
                `## Baseline CVE Gate Blocked`,
                `**Slug:** \`${{ matrix.slug }}\``,
                `**Image:** \`${{ steps.cfg.outputs.BASELINE_UPSTREAM_IMAGE }}:${{ steps.cfg.outputs.BASELINE_UPSTREAM_TAG }}\``,
                `**CRITICAL (fixable):** ${{ steps.cve.outputs.critical }}`,
                `**HIGH (fixable):** ${{ steps.cve.outputs.high }}`,
                ``,
                `Sync blocked until upstream publishes a patched image.`,
                `**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              ].join('\n'),
            });

      # ── Log in to ghcr.io/gwshield ────────────────────────────────────────
      - name: Log in to GHCR
        if: >-
          steps.resolve.outputs.changed == 'true' &&
          steps.cve.outputs.cve_blocked != 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DST_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── skopeo copy upstream → ghcr.io/gwshield ───────────────────────────
      - name: Mirror image to ghcr.io/gwshield
        id: mirror
        if: >-
          steps.resolve.outputs.changed == 'true' &&
          steps.cve.outputs.cve_blocked != 'true'
        run: |
          set -euo pipefail
          SRC="${{ steps.resolve.outputs.src_ref }}"
          IMG="${{ steps.cfg.outputs.BASELINE_UPSTREAM_IMAGE }}"
          # Strip registry prefix for naming
          IMG_SHORT="${IMG##*/}"
          DST="docker://${{ env.DST_REGISTRY }}/${{ env.DST_ORG }}/${IMG_SHORT}:${{ steps.cfg.outputs.BASELINE_MIRROR_TAG }}"
          MIRROR_IMAGE="${{ steps.cfg.outputs.BASELINE_MIRROR_IMAGE }}"
          MIRROR_TAG="${{ steps.cfg.outputs.BASELINE_MIRROR_TAG }}"

          echo "Mirroring: ${SRC} → docker://${MIRROR_IMAGE}:${MIRROR_TAG}"

          skopeo copy \
            --all \
            --src-no-creds \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "${SRC}" \
            "docker://${MIRROR_IMAGE}:${MIRROR_TAG}"

          # Resolve pushed digest
          PUSHED=$(skopeo inspect \
            --raw \
            --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker://${MIRROR_IMAGE}:${MIRROR_TAG}" 2>/dev/null \
            | python3 -c "
          import json,sys,hashlib
          d=sys.stdin.buffer.read()
          print('sha256:'+hashlib.sha256(d).hexdigest())
          " || echo "")

          echo "pushed_digest=${PUSHED}" >> "$GITHUB_OUTPUT"
          echo "dst_image=${MIRROR_IMAGE}:${MIRROR_TAG}" >> "$GITHUB_OUTPUT"
          echo "Mirrored → ${MIRROR_IMAGE}:${MIRROR_TAG} (${PUSHED:0:19}...)"

      # ── cosign sign ───────────────────────────────────────────────────────
      - name: Sign mirrored image
        if: >-
          steps.resolve.outputs.changed == 'true' &&
          steps.cve.outputs.cve_blocked != 'true' &&
          steps.mirror.outputs.pushed_digest != ''
        run: |
          cosign sign --yes \
            "${{ steps.cfg.outputs.BASELINE_MIRROR_IMAGE }}:${{ steps.cfg.outputs.BASELINE_MIRROR_TAG }}@${{ steps.mirror.outputs.pushed_digest }}"
          echo "Signed: ${{ steps.cfg.outputs.BASELINE_MIRROR_IMAGE }}:${{ steps.cfg.outputs.BASELINE_MIRROR_TAG }}@${{ steps.mirror.outputs.pushed_digest }}"
        env:
          COSIGN_EXPERIMENTAL: '1'


      # ── SBOM + SLSA provenance attestation (Stufe 2 — Verified Mirror) ────
      # syft generates SPDX SBOM from the mirrored image (same content as
      # upstream, but now signed by us — attests we inspected it).
      # continue-on-error: true — attestation outage must not block sync.
      - name: Install syft
        if: >-
          always() && steps.resolve.outputs.changed == 'true' &&
          steps.cve.outputs.cve_blocked != 'true' &&
          steps.mirror.outputs.pushed_digest != ''
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate and attest SBOM
        id: sbom
        if: >-
          always() && steps.resolve.outputs.changed == 'true' &&
          steps.cve.outputs.cve_blocked != 'true' &&
          steps.mirror.outputs.pushed_digest != ''
        continue-on-error: true
        run: |
          set -euo pipefail
          MIRROR="${{ steps.cfg.outputs.BASELINE_MIRROR_IMAGE }}"
          TAG="${{ steps.cfg.outputs.BASELINE_MIRROR_TAG }}"
          DIGEST="${{ steps.mirror.outputs.pushed_digest }}"
          SLUG="${{ matrix.slug }}"
          mkdir -p sbom-out

          # Per-platform SBOM + attest (same pattern as promote.yml)
          RAW=$(skopeo inspect --raw             --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}"             "docker://${MIRROR}:${TAG}@${DIGEST}" 2>/dev/null || true)

          IS_INDEX=$(echo "${RAW}" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          mt=d.get('mediaType','')
          print('true' if ('index' in mt or 'list' in mt) else 'false')
          " 2>/dev/null || echo "false")

          if [[ "${IS_INDEX}" == "true" ]]; then
            PLAT_DIGESTS=$(echo "${RAW}" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for m in d.get('manifests',[]):
              p=m.get('platform',{})
              os_=p.get('os',''); arch=p.get('architecture','')
              if os_ and arch and os_!='unknown' and arch!='unknown':
                  print(f'{os_}/{arch}|{m.get("digest","")}')
          " 2>/dev/null || true)

            for ROW in $PLAT_DIGESTS; do
              PLAT="${ROW%%|*}"; PDIGEST="${ROW##*|}"
              [[ -z "${PDIGEST}" ]] && continue
              PLAT_SAFE="${PLAT//\//-}"
              SBOM_FILE="sbom-out/sbom-${SLUG}-${PLAT_SAFE}-spdx.json"

              syft "${MIRROR}@${PDIGEST}" --output spdx-json="${SBOM_FILE}"
              cosign attest --yes                 --predicate "${SBOM_FILE}" --type spdx                 "${MIRROR}@${PDIGEST}"
              echo "  SBOM attested: ${PLAT} → ${MIRROR}@${PDIGEST}"
            done
          else
            SBOM_FILE="sbom-out/sbom-${SLUG}-spdx.json"
            syft "${MIRROR}:${TAG}@${DIGEST}" --output spdx-json="${SBOM_FILE}"
            cosign attest --yes               --predicate "${SBOM_FILE}" --type spdx               "${MIRROR}:${TAG}@${DIGEST}"
            echo "  SBOM attested: ${MIRROR}:${TAG}@${DIGEST}"
          fi

      - name: Upload SBOM artifacts
        if: >-
          always() && steps.sbom.conclusion != 'skipped' &&
          steps.mirror.outputs.pushed_digest != ''
        uses: actions/upload-artifact@v4
        with:
          name: sbom-baseline-${{ matrix.slug }}
          path: sbom-out/
          retention-days: 365
          if-no-files-found: warn

      # ── Dispatch digest update to private repo if digest changed ──────────
      - name: Dispatch digest update to RelicFrog/gwshield-images
        if: >-
          steps.resolve.outputs.changed == 'true' &&
          steps.cve.outputs.cve_blocked != 'true' &&
          steps.resolve.outputs.current_digest != steps.resolve.outputs.pinned_digest
        run: |
          gh api repos/${SRC_REPO}/dispatches \
            --method POST \
            --field event_type=baseline-digest-update \
            --field "client_payload[slug]=${{ matrix.slug }}" \
            --field "client_payload[old_digest]=${{ steps.resolve.outputs.pinned_digest }}" \
            --field "client_payload[new_digest]=${{ steps.resolve.outputs.current_digest }}" \
            --field "client_payload[mirror_image]=${{ steps.cfg.outputs.BASELINE_MIRROR_IMAGE }}:${{ steps.cfg.outputs.BASELINE_MIRROR_TAG }}" \
            --field "client_payload[mirror_digest]=${{ steps.mirror.outputs.pushed_digest }}"
          echo "Dispatched digest update to ${SRC_REPO}"
        env:
          GH_TOKEN: ${{ secrets.RELICFROG_DISPATCH_PAT }}

      # ── Supabase writeback (continue-on-error) ────────────────────────────

      # ── Mirror-Verification Smoke Test ───────────────────────────────────
      # 5 checks — no container startup needed, pure registry + cosign API:
      #   reachable      skopeo inspect ok
      #   digest_match   mirror manifest digest recorded
      #   cosign_sig     keyless signature verifiable (gwshield/images OIDC)
      #   sbom_attest    cosign verify-attestation --type spdx ok
      #   multi_platform linux/amd64 + linux/arm64 platform manifests present
      - name: Mirror verification smoke test
        id: smoke
        if: >-
          always() && steps.resolve.outputs.changed == 'true' &&
          steps.cve.outputs.cve_blocked != 'true' &&
          steps.mirror.outputs.pushed_digest != ''
        continue-on-error: true
        run: |
          set -euo pipefail
          MIRROR="${{ steps.cfg.outputs.BASELINE_MIRROR_IMAGE }}"
          TAG="${{ steps.cfg.outputs.BASELINE_MIRROR_TAG }}"
          DIGEST="${{ steps.mirror.outputs.pushed_digest }}"
          PLATFORMS="${{ steps.cfg.outputs.BASELINE_PLATFORMS }}"
          PASS=0; FAIL=0

          _pass() { echo "  [PASS] $1 — ${2:-}"; ((PASS++)) || true; }
          _fail() { echo "  [FAIL] $1 — ${2:-}"; ((FAIL++)) || true; }

          # Accumulate checks as JSON via python (safe for special chars)
          CHECKS_FILE=$(mktemp)
          echo "[]" > "$CHECKS_FILE"
          _record() {
            python3 -c "
          import json,sys
          checks=json.load(open(sys.argv[1]))
          checks.append({'id':sys.argv[2],'label':sys.argv[3],
                          'status':sys.argv[4],'detail':sys.argv[5]})
          open(sys.argv[1],'w').write(json.dumps(checks))
          " "$CHECKS_FILE" "$1" "$2" "$3" "$4" 2>/dev/null || true
          }

          echo "=== Mirror Verification: ${MIRROR}:${TAG} ==="

          # 1. Reachable
          if skopeo inspect --no-creds "docker://${MIRROR}:${TAG}" >/dev/null 2>&1; then
            _pass "image reachable in ghcr.io/gwshield" "${MIRROR}:${TAG}"
            _record "reachable" "Image reachable in ghcr.io/gwshield" "passed" "${MIRROR}:${TAG}"
          else
            _fail "image reachable in ghcr.io/gwshield" "skopeo inspect failed"
            _record "reachable" "Image reachable in ghcr.io/gwshield" "failed" "skopeo inspect failed"
          fi

          # 2. Digest recorded
          MIRROR_DIGEST=$(skopeo inspect --no-creds --raw             "docker://${MIRROR}:${TAG}" 2>/dev/null             | python3 -c "import json,sys,hashlib; d=sys.stdin.buffer.read(); print('sha256:'+hashlib.sha256(d).hexdigest())"             2>/dev/null || echo "unknown")
          _pass "mirror manifest digest recorded" "${MIRROR_DIGEST:0:19}..."
          _record "digest_recorded" "Mirror manifest digest recorded" "passed" "${MIRROR_DIGEST:0:19}..."

          # 3. cosign signature
          if cosign verify               --certificate-identity-regexp="https://github.com/gwshield/images.*"               --certificate-oidc-issuer="https://token.actions.githubusercontent.com"               "${MIRROR}:${TAG}@${DIGEST}" >/dev/null 2>&1; then
            _pass "cosign signature valid" "keyless OIDC, Rekor logged"
            _record "cosign_sig" "cosign signature valid (gwshield/images OIDC)" "passed" "keyless Rekor logged"
          else
            _fail "cosign signature valid" "cosign verify failed"
            _record "cosign_sig" "cosign signature valid (gwshield/images OIDC)" "failed" "cosign verify failed"
          fi

          # 4. SBOM attestation
          if cosign verify-attestation               --type spdx               --certificate-identity-regexp="https://github.com/gwshield/images.*"               --certificate-oidc-issuer="https://token.actions.githubusercontent.com"               "${MIRROR}:${TAG}@${DIGEST}" >/dev/null 2>&1; then
            _pass "SBOM attestation present (spdx)" "cosign verify-attestation ok"
            _record "sbom_attest" "SBOM attestation present (spdx)" "passed" "cosign verify-attestation ok"
          else
            _fail "SBOM attestation present (spdx)" "cosign verify-attestation failed"
            _record "sbom_attest" "SBOM attestation present (spdx)" "failed" "cosign verify-attestation failed"
          fi

          # 5. Multi-platform manifests
          PLAT_COUNT=$(skopeo inspect --no-creds --raw "docker://${MIRROR}:${TAG}" 2>/dev/null             | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          n=len([m for m in d.get('manifests',[])
                 if m.get('platform',{}).get('os') not in ('','unknown')])
          print(n)
          " 2>/dev/null || echo "0")
          EXPECTED=$(echo "$PLATFORMS" | tr ',' '\n' | grep -c "linux/" || echo "1")
          if [[ "$PLAT_COUNT" -ge "$EXPECTED" ]]; then
            _pass "platform manifests present" "${PLAT_COUNT}/${EXPECTED} platforms"
            _record "multi_platform" "Platform manifests present" "passed" "${PLAT_COUNT} platform(s)"
          else
            _fail "platform manifests present" "expected >=${EXPECTED}, got ${PLAT_COUNT}"
            _record "multi_platform" "Platform manifests present" "failed" "expected>=${EXPECTED} got ${PLAT_COUNT}"
          fi

          echo ""
          OVERALL="passed"; [[ $FAIL -gt 0 ]] && OVERALL="failed"
          echo "=== Smoke: ${PASS} passed, ${FAIL} failed ==="

          CHECKS_JSON=$(cat "$CHECKS_FILE"); rm -f "$CHECKS_FILE"
          _D=$(openssl rand -hex 8)
          { echo "smoke_status<<${_D}"; echo "${OVERALL}"; echo "${_D}"; } >> "$GITHUB_OUTPUT"
          { echo "smoke_pass<<${_D}";   echo "${PASS}";    echo "${_D}"; } >> "$GITHUB_OUTPUT"
          { echo "smoke_fail<<${_D}";   echo "${FAIL}";    echo "${_D}"; } >> "$GITHUB_OUTPUT"
          { echo "smoke_checks<<${_D}"; echo "${CHECKS_JSON}"; echo "${_D}"; } >> "$GITHUB_OUTPUT"

      - name: Write sync result to Supabase
        if: steps.resolve.outputs.changed == 'true'
        continue-on-error: true
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Pass smoke_checks JSON via env var — avoids bash syntax errors from
          # unescaped { } ( ) characters when interpolated directly into run: shell.
          SMOKE_CHECKS_JSON: ${{ steps.smoke.outputs.smoke_checks || '[]' }}
        run: |
          # Write smoke_checks JSON to a temp file to avoid shell quoting issues
          CHECKS_FILE=$(mktemp)
          printf '%s' "${SMOKE_CHECKS_JSON}" > "${CHECKS_FILE}"

          python3 scripts/supabase_ingress.py baseline \
            --slug           "${{ matrix.slug }}" \
            --upstream-image "${{ steps.cfg.outputs.BASELINE_UPSTREAM_IMAGE }}" \
            --upstream-tag   "${{ steps.cfg.outputs.BASELINE_UPSTREAM_TAG }}" \
            --upstream-digest "${{ steps.resolve.outputs.current_digest }}" \
            --mirror-image   "${{ steps.cfg.outputs.BASELINE_MIRROR_IMAGE }}:${{ steps.cfg.outputs.BASELINE_MIRROR_TAG }}" \
            --mirror-digest  "${{ steps.mirror.outputs.pushed_digest || '' }}" \
            --status         "${{ steps.cve.outputs.cve_blocked == 'true' && 'blocked_cve' || 'synced' }}" \
            --critical       "${{ steps.cve.outputs.critical || '0' }}" \
            --high           "${{ steps.cve.outputs.high || '0' }}" \
            --smoke-status   "${{ steps.smoke.outputs.smoke_status || 'skipped' }}" \
            --smoke-pass     "${{ steps.smoke.outputs.smoke_pass || '0' }}" \
            --smoke-fail     "${{ steps.smoke.outputs.smoke_fail || '0' }}" \
            --smoke-checks-file "${CHECKS_FILE}" \
            --run-url        "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          rm -f "${CHECKS_FILE}"

      # ── Job summary ───────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          {
            echo "## Baseline Sync: \`${{ matrix.slug }}\`"
            if [[ "${{ steps.resolve.outputs.changed }}" != "true" ]]; then
              echo "**Status:** ⏭ Skipped — digest unchanged"
            elif [[ "${{ steps.cve.outputs.cve_blocked }}" == "true" ]]; then
              echo "**Status:** ❌ BLOCKED — ${{ steps.cve.outputs.critical }} fixable CRITICAL CVEs"
            else
              echo "**Status:** ✅ Synced"
              echo "| Upstream | \`${{ steps.cfg.outputs.BASELINE_UPSTREAM_IMAGE }}:${{ steps.cfg.outputs.BASELINE_UPSTREAM_TAG }}\` |"
              echo "| Mirror   | \`${{ steps.mirror.outputs.dst_image }}\` |"
              echo "| Digest   | \`${{ steps.mirror.outputs.pushed_digest }}\` |"
              echo "| HIGH CVEs | ${{ steps.cve.outputs.high }} (informational) |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
